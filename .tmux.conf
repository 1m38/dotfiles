# prefix
set -g prefix C-]
unbind C-b


# 設定ファイルをリロードする
bind-key r source-file ~/.tmux.conf \; display "Reloaded!"

# キーストロークのディレイを減らす
set -sg escape-time 1

# utf8を有効にする
set-window-option -g utf8 on

# キーバインドをemacs設定に
set-window-option -g mode-keys emacs

# | でペインを縦に分割する
bind-key | split-window -h
# - でペインを横に分割する
bind-key - split-window -v

# 256色端末を使用する
# set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"

# ステータスバーの色を設定する
set -g status-fg white
set -g status-bg black

# status line を更新する間隔を 1 秒にする
set-option -g status-interval 1
# status-right の最大の長さを指定する。
set-option -g status-right-length 80
# status-right のフォーマットを指定する。
set-option -g status-right "#[fg=colour255,bg=colour241] #h | %m/%d %H:%M:%S | LA: #(cut -d' ' -f-3 /proc/loadavg) #[default]"
# window-status のフォーマットを指定する。
set-window-option -g window-status-format "#I:#W-"
# カレントウィンドウの window-status のフォーマットを指定する
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour241,bold]#I:#W*#[default]"

# ウィンドウタイトルを"USER@hostname"にする
set-option -g set-titles on
set-option -g set-titles-string "$USER@#(hostname)"
